<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2233"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <radialGradient id="shield" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3dc8e8"/>
      <stop offset="60%" stop-color="#1a7a9a"/>
      <stop offset="100%" stop-color="#0d4a60"/>
    </radialGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c8d0"/>
      <stop offset="50%" stop-color="#8090a0"/>
      <stop offset="100%" stop-color="#506070"/>
    </linearGradient>
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#607080"/>
      <stop offset="50%" stop-color="#404850"/>
      <stop offset="100%" stop-color="#303840"/>
    </linearGradient>
  </defs>
  <!-- outer gear ring -->
  <circle cx="32" cy="32" r="30" fill="url(#gear)" stroke="#506068" stroke-width="1"/>
  <!-- gear teeth -->
  <g fill="#58646e" opacity="0.9">
    <rect x="29" y="0" width="6" height="6" rx="1"/>
    <rect x="29" y="58" width="6" height="6" rx="1"/>
    <rect x="0" y="29" width="6" height="6" rx="1"/>
    <rect x="58" y="29" width="6" height="6" rx="1"/>
    <rect x="8.5" y="6" width="5" height="5" rx="1" transform="rotate(45 11 8.5)"/>
    <rect x="50.5" y="6" width="5" height="5" rx="1" transform="rotate(45 53 8.5)"/>
    <rect x="8.5" y="53" width="5" height="5" rx="1" transform="rotate(45 11 55.5)"/>
    <rect x="50.5" y="53" width="5" height="5" rx="1" transform="rotate(45 53 55.5)"/>
  </g>
  <!-- inner dark circle -->
  <circle cx="32" cy="32" r="24" fill="url(#bg)" stroke="#384050" stroke-width="1.5"/>
  <!-- inner ring detail -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#283040" stroke-width="0.8"/>
  <!-- left wing -->
  <path d="M30 32 Q22 24 10 22 Q14 28 16 32 Q14 36 10 42 Q22 40 30 32Z" fill="url(#wing)" opacity="0.85"/>
  <!-- right wing -->
  <path d="M34 32 Q42 24 54 22 Q50 28 48 32 Q50 36 54 42 Q42 40 34 32Z" fill="url(#wing)" opacity="0.85"/>
  <!-- wing highlight lines -->
  <path d="M28 30 Q22 26 14 24" fill="none" stroke="#d0d8e0" stroke-width="0.5" opacity="0.5"/>
  <path d="M36 30 Q42 26 50 24" fill="none" stroke="#d0d8e0" stroke-width="0.5" opacity="0.5"/>
  <path d="M28 34 Q22 38 14 40" fill="none" stroke="#d0d8e0" stroke-width="0.4" opacity="0.3"/>
  <path d="M36 34 Q42 38 50 40" fill="none" stroke="#d0d8e0" stroke-width="0.4" opacity="0.3"/>
  <!-- center shield -->
  <path d="M32 20 Q39 22 40 28 Q40 38 32 44 Q24 38 24 28 Q25 22 32 20Z" fill="url(#shield)" stroke="#2aa0c0" stroke-width="0.8"/>
  <!-- shield highlight -->
  <path d="M32 22 Q37 24 38 28 Q38 30 36 32" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <!-- center dot -->
  <circle cx="32" cy="30" r="2" fill="rgba(180,240,255,0.5)"/>
</svg>
